<!doctype html>
<html lang="VI">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Flight-Listing</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/flight-listing.css" />
  <link rel="stylesheet" href="assets/css/header.css">
</html>
<body>
  <header class="header header--no-margin">
      <div class="header__container">
        <!-- Left Menu -->
        <nav class="navbar">
          <ul class="navbar__list">
            <li class="navbar__item navbar__item--active">
              <img src="assets/image/airplane_light.svg" alt="Flight" class="header__icon" />
              <a href="find-flight.html" class="navbar__link">Find Flight</a>
            </li>
            <li class="navbar__item ">
              <img src="assets/image/bed_light.svg" alt="Stays" class="header__icon" />
              <a href="find-stays.html" class="navbar__link">Find Stays</a>
            </li>
          </ul>
        </nav>

        <!-- Logo Center -->
        <div class="logo">
          <a href="index.html" class="logo-link">
            <img src="assets/image/logo-small.png" alt="Golobe" />
          </a>
        </div>

        <!-- Right Menu -->
        <div class="user-action">
          <ul class="user-action__list">
            <li class="user-action__item">
              <img src="assets/image/heart_light.png" alt="Heart" class="header__icon" />
              <a href="#" class="user-action__link">Favourites</a>
            </li>
            <li class="user-action__item user-action__separator">|</li>
            <li class="user-action__item">
              <a href="#" class="user-action__link user-action__profile">
                <div class="header__avatar-wrap">
                  <img src="assets/image/user-avt.png" alt="John D." class="user-action__avt" />
                  <img src="assets/image/ellipse.svg" alt="" class="user-action__ellipse" />
                  <img src="assets/image/arrow-down_slamon.svg" alt="" class="user-action__arrow" />
                </div>
                John D.
              </a>
              <!-- User Menu -->
              <div class="user-menu">
                <div class="user-menu__header">
                  <img src="assets/image/user-avt.svg" alt="John Doe." class="user-menu_avatar" />
                  <div class="user-menu__info">
                    <span class="user-menu__info-name">John Doe.</span>
                    <span class="user-menu__info-status">Online</span>
                  </div>
                </div>

                <div class="user-menu__separator"></div>

                <ul class="user-menu__list account-menu">
                  <li class="user-menu__item">
                    <a href="#" class="user-menu__link">
                      <img src="assets/image/user_light.svg" alt="#" class="user__icon" />
                      My account
                      <img src="assets/image/chevron-forward_light.svg" alt="#" class="user__icon-arrow" />
                    </a>
                  </li>
                  <li class="user-menu__item">
                    <a href="#" class="user-menu__link">
                      <img src="assets/image/card_light.png" alt="#" class="user__icon" />
                      Payments
                      <img src="assets/image/chevron-forward_light.svg" alt="#" class="user__icon-arrow" />
                    </a>
                  </li>
                  <li class="user-menu__item">
                    <a href="#" class="user-menu__link">
                      <img src="assets/image/setting_light.png" alt="#" class="user__icon" />
                      Setting
                      <img src="assets/image/chevron-forward_light.svg" alt="#" class="user__icon-arrow" />
                    </a>
                  </li>
                </ul>

                <div class="user-menu__separator"></div>

                <ul class="user-menu__list system-menu">
                  <li class="user-menu__item">
                    <a href="#" class="user-menu__link">
                      <img src="assets/image/support_light.png" alt="#" class="user__icon" />
                      Support
                      <img src="assets/image/chevron-forward_light.svg" alt="#" class="user__icon-arrow" />
                    </a>
                  </li>
                  <li class="user-menu__item">
                    <a href="#" class="user-menu__link">
                      <img src="assets/image/logout_light.png" alt="#" class="user__icon" />
                      Logout
                    </a>
                  </li>
                </ul>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </header>
</body>
